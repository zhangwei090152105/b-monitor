name: 吉客云B单未完结监控

# cron: 北京时间每天 9:00 → UTC 1:00

on:
  schedule:
    - cron: '0 1 * * *'
  
  workflow_dispatch:
    inputs:
      date_override:
        description: '数据日期（YYYYMMDD，留空则使用当天）'
        required: false
        default: ''
        type: string

permissions:
  contents: write

jobs:
  b-monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 执行 B 单监控
        env:
          TZ: Asia/Shanghai
          JKY_APPKEY: ${{ secrets.JKY_APPKEY }}
          JKY_APPSECRET: ${{ secrets.JKY_APPSECRET }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          TO_ADDR: ${{ secrets.TO_ADDR }}
          CC_ADDR: ${{ secrets.CC_ADDR }}
          WECOM_WEBHOOK_1: ${{ secrets.WECOM_WEBHOOK_1 }}
          WECOM_WEBHOOK_2: ${{ secrets.WECOM_WEBHOOK_2 }}
          MIAODA_URL: ${{ secrets.MIAODA_URL }}
          B_MONITOR_DATE: ${{ inputs.date_override }}
        run: python main.py

      - name: 推送看板 HTML
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "更新看板 $(TZ=Asia/Shanghai date +%Y%m%d)"
          git push

      - name: 上传 Excel 报告（Artifacts 备份）
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: b-monitor-report
          path: output/*.xlsx
          retention-days: 30
